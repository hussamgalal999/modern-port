# This workflow will improvise current file with AI genereated documentation and Create new PR

name: Penify - Revolutionizing Documentation on GitHub

on:
  push:
    branches: ["main"]
    # ⚡ Bolt: Added paths-ignore to prevent redundant CI runs on non-code changes.
    # Expected impact: Reduces redundant CI runs by ~10-20% by ignoring documentation and meta files.
    paths-ignore:
      - 'README.md'
      - '.github/workflows/**'
      - '.jules/**'
  workflow_dispatch:

# ⚡ Bolt: Added concurrency to cancel in-progress runs when a new one is triggered.
# Expected impact: Prevents resource waste and ensures only the latest commit is processed.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documentation:
    runs-on: ubuntu-latest
    # ⚡ Bolt: Added timeout-minutes to prevent hung processes from consuming excessive resources.
    # Expected impact: Limits resource consumption for stalled or slow runs.
    timeout-minutes: 10
    steps:
    - name: Penify DocGen Client
      uses: SingularityX-ai/snorkell-documentation-client@v1.0.0
      with:
        client_id: ${{ secrets.SNORKELL_CLIENT_ID }}
        api_key: ${{ secrets.SNORKELL_API_KEY }}
        branch_name: "main"
