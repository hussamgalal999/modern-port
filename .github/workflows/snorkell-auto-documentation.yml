# This workflow will improvise current file with AI genereated documentation and Create new PR

name: Penify - Revolutionizing Documentation on GitHub

on:
  push:
    branches: ["main"]
    # ⚡ OPTIMIZATION: Skip documentation updates when only README or workflows are changed.
    paths-ignore:
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:

# ⚡ OPTIMIZATION: Cancel redundant documentation runs on the same branch to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documentation:
    runs-on: ubuntu-latest
    # ⚡ OPTIMIZATION: Prevent hung jobs from consuming excessive GitHub Actions resources.
    timeout-minutes: 15
    steps:
    - name: Penify DocGen Client
      uses: SingularityX-ai/snorkell-documentation-client@v1.0.0
      with:
        client_id: ${{ secrets.SNORKELL_CLIENT_ID }}
        api_key: ${{ secrets.SNORKELL_API_KEY }}
        branch_name: "main"