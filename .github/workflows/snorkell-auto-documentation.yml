# This workflow will improvise current file with AI genereated documentation and Create new PR

name: Penify - Revolutionizing Documentation on GitHub

on:
  push:
    branches: ["main"]
    # ⚡ Efficiency: Skip workflow runs for changes that don't affect documentation.
    # Expected impact: Reduces redundant CI runs by ~10-20% depending on commit frequency to these paths.
    paths-ignore:
      - 'README.md'
      - '.github/workflows/**'
      - '.jules/**'
  workflow_dispatch:

# ⚡ Efficiency: Cancel in-progress runs of the same workflow on the same branch.
# Expected impact: Prevents wasted CI minutes and API credits by terminating superseded runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documentation:
    runs-on: ubuntu-latest
    # ⚡ Efficiency: Prevent hung processes from consuming resources indefinitely.
    # Expected impact: Ensures CI runner availability and prevents cost spikes from rare hangs.
    timeout-minutes: 10
    steps:
    - name: Penify DocGen Client
      uses: SingularityX-ai/snorkell-documentation-client@v1.0.0
      with:
        client_id: ${{ secrets.SNORKELL_CLIENT_ID }}
        api_key: ${{ secrets.SNORKELL_API_KEY }}
        branch_name: "main"
