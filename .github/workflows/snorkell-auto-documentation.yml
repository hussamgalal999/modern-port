# This workflow will improvise current file with AI genereated documentation and Create new PR

name: Penify - Revolutionizing Documentation on GitHub

on:
  push:
    branches: ["main"]
    # ⚡ Bolt: Skip CI runs for non-code changes to save resources and speed up feedback loops.
    # Expected impact: Reduces redundant CI runs by ~10-20% depending on commit frequency.
    paths-ignore:
      - 'README.md'
      - '.github/workflows/**'
      - '.jules/**'
  workflow_dispatch:

# ⚡ Bolt: Cancel overlapping runs on the same branch to optimize resource usage.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documentation:
    runs-on: ubuntu-latest
    # ⚡ Bolt: Set a reasonable timeout to prevent hung processes from consuming minutes.
    timeout-minutes: 10
    steps:
    - name: Penify DocGen Client
      uses: SingularityX-ai/snorkell-documentation-client@v1.0.0
      with:
        client_id: ${{ secrets.SNORKELL_CLIENT_ID }}
        api_key: ${{ secrets.SNORKELL_API_KEY }}
        branch_name: "main"