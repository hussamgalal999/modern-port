# This workflow will improvise current file with AI genereated documentation and Create new PR

name: Penify - Revolutionizing Documentation on GitHub

# Optimizing the documentation workflow for efficiency and cost-saving.
on:
  push:
    branches: ["main"]
    # ⚡ Bolt: Skip workflow for non-documentation changes to save CI/CD resources.
    paths-ignore:
      - '.github/**'
      - 'README.md'
  workflow_dispatch:

# ⚡ Bolt: Cancel redundant runs on new pushes to the same branch.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documentation:
    runs-on: ubuntu-latest
    # ⚡ Bolt: Prevent hung processes from consuming excessive runner minutes.
    timeout-minutes: 15
    steps:
    - name: Penify DocGen Client
      uses: SingularityX-ai/snorkell-documentation-client@v1.0.0
      with:
        client_id: ${{ secrets.SNORKELL_CLIENT_ID }}
        api_key: ${{ secrets.SNORKELL_API_KEY }}
        branch_name: "main"