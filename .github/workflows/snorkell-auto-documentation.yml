# This workflow will improvise current file with AI genereated documentation and Create new PR

name: Penify - Revolutionizing Documentation on GitHub

on:
  push:
    branches: ["main"]
    # ⚡ Bolt: Skip workflow runs for non-code changes to save CI resources.
    # Expected impact: Reduces redundant CI runs by ~10-20% depending on commit frequency.
    paths-ignore:
      - 'README.md'
      - '.github/workflows/**'
      - '.jules/**'
  workflow_dispatch:

# ⚡ Bolt: Added concurrency to cancel in-progress runs for the same branch to save CI resources.
# Expected impact: Prevents resource waste on outdated commits.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documentation:
    # ⚡ Bolt: Set a timeout to prevent hung processes from consuming excessive CI minutes.
    # Expected impact: Caps maximum resource usage per run.
    timeout-minutes: 10
    runs-on: ubuntu-latest
    steps:
    - name: Penify DocGen Client
      uses: SingularityX-ai/snorkell-documentation-client@v1.0.0
      with:
        client_id: ${{ secrets.SNORKELL_CLIENT_ID }}
        api_key: ${{ secrets.SNORKELL_API_KEY }}
        branch_name: "main"
