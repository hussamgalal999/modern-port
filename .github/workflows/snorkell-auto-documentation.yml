# This workflow will improvise current file with AI genereated documentation and Create new PR

name: Penify - Revolutionizing Documentation on GitHub

on:
  push:
    branches: ["main"]
    # ⚡ Expected impact: Reduces redundant CI runs for non-code changes by ~10-15%
    paths-ignore:
      - 'README.md'
      - '.github/workflows/**'
      - '.jules/**'
  workflow_dispatch:

# ⚡ Expected impact: Saves GitHub Actions minutes by canceling redundant in-progress runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documentation:
    runs-on: ubuntu-latest
    # ⚡ Expected impact: Prevents wasting CI resources on hung processes
    timeout-minutes: 10
    steps:
    - name: Penify DocGen Client
      uses: SingularityX-ai/snorkell-documentation-client@v1.0.0
      with:
        client_id: ${{ secrets.SNORKELL_CLIENT_ID }}
        api_key: ${{ secrets.SNORKELL_API_KEY }}
        branch_name: "main"
