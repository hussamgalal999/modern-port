# This workflow will improvise current file with AI genereated documentation and Create new PR

name: Penify - Revolutionizing Documentation on GitHub

on:
  push:
    branches: ["main"]
    # ⚡ Bolt: Ignore non-code paths to reduce redundant CI runs.
    # Expected impact: Reduces redundant CI runs by ~10-20% by skipping documentation updates for non-code files.
    paths-ignore:
      - 'README.md'
      - '.github/workflows/**'
      - '.jules/**'
  workflow_dispatch:

# ⚡ Bolt: Concurrency to cancel in-progress runs for the same workflow/branch.
# Expected impact: Prevents unnecessary resource consumption by canceling outdated workflow runs.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documentation:
    runs-on: ubuntu-latest
    # ⚡ Bolt: Add timeout to prevent the job from hanging indefinitely.
    # Expected impact: Ensures CI slots are freed up if the documentation client hangs.
    timeout-minutes: 10
    steps:
    - name: Penify DocGen Client
      uses: SingularityX-ai/snorkell-documentation-client@v1.0.0
      with:
        client_id: ${{ secrets.SNORKELL_CLIENT_ID }}
        api_key: ${{ secrets.SNORKELL_API_KEY }}
        branch_name: "main"