# This workflow will improvise current file with AI genereated documentation and Create new PR

name: Penify - Revolutionizing Documentation on GitHub

on:
  push:
    branches: ["main"]
    # ⚡ Bolt: Ignore changes that don't affect code to save CI resources
    paths-ignore:
      - 'README.md'
      - '.github/workflows/**'
      - '.jules/**'
  workflow_dispatch:

# ⚡ Bolt: Cancel redundant workflow runs on the same branch to save CI minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documentation:
    runs-on: ubuntu-latest
    # ⚡ Bolt: Prevent hung processes from consuming excessive resources
    timeout-minutes: 10
    steps:
    - name: Penify DocGen Client
      uses: SingularityX-ai/snorkell-documentation-client@v1.0.0
      with:
        client_id: ${{ secrets.SNORKELL_CLIENT_ID }}
        api_key: ${{ secrets.SNORKELL_API_KEY }}
        branch_name: "main"
