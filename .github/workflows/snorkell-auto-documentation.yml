# This workflow will improvise current file with AI genereated documentation and Create new PR

name: Penify - Revolutionizing Documentation on GitHub

on:
  push:
    branches: ["main"]
    # ⚡ Optimization: Ignore non-code paths to reduce redundant workflow runs
    paths-ignore:
      - 'README.md'
      - '.jules/**'
      - '.github/workflows/**'
  workflow_dispatch:

# ⚡ Optimization: Cancel in-progress runs when a new push is made to the same ref
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documentation:
    runs-on: ubuntu-latest
    # ⚡ Optimization: Prevent hung processes from consuming resources
    timeout-minutes: 10
    steps:
    - name: Penify DocGen Client
      uses: SingularityX-ai/snorkell-documentation-client@v1.0.0
      with:
        client_id: ${{ secrets.SNORKELL_CLIENT_ID }}
        api_key: ${{ secrets.SNORKELL_API_KEY }}
        branch_name: "main"