# This workflow will improvise current file with AI genereated documentation and Create new PR

name: Penify - Revolutionizing Documentation on GitHub

on:
  push:
    branches: ["main"]
    paths-ignore:
      - 'README.md'
      - '.github/workflows/**'
  workflow_dispatch:

# Prevents redundant parallel runs on the same branch by cancelling in-progress runs
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documentation:
    runs-on: ubuntu-latest
    # Added timeout to prevent hung processes from consuming resources indefinitely
    timeout-minutes: 15
    steps:
    - name: Penify DocGen Client
      uses: SingularityX-ai/snorkell-documentation-client@v1.0.0
      with:
        client_id: ${{ secrets.SNORKELL_CLIENT_ID }}
        api_key: ${{ secrets.SNORKELL_API_KEY }}
        branch_name: "main"
