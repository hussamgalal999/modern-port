# This workflow will improvise current file with AI genereated documentation and Create new PR

name: Penify - Revolutionizing Documentation on GitHub

on:
  push:
    branches: ["main"]
    # ⚡ Bolt: Ignore changes to non-code files to reduce redundant runs.
    paths-ignore:
      - 'README.md'
      - '.github/workflows/**'
      - '.jules/**'
  workflow_dispatch:

# ⚡ Bolt: Cancel in-progress runs when a new one is triggered to save resources.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  Documentation:
    runs-on: ubuntu-latest
    # ⚡ Bolt: Set a reasonable timeout to prevent hung processes from wasting resources.
    timeout-minutes: 10
    steps:
    - name: Penify DocGen Client
      uses: SingularityX-ai/snorkell-documentation-client@v1.0.0
      with:
        client_id: ${{ secrets.SNORKELL_CLIENT_ID }}
        api_key: ${{ secrets.SNORKELL_API_KEY }}
        branch_name: "main"
